[mypy]
files = src
exclude = /migrations/
strict = true
pretty = true
disallow_any_explicit = false
disallow_any_generics = false
warn_unreachable = true
show_column_numbers = true
show_error_context = true
check_untyped_defs = true
show_error_codes = true
mypy_path = src
explicit_package_bases = true

[mypy-asyncpg.*]
ignore_missing_imports = true

[mypy-sqlalchemy.*]
ignore_missing_imports = true

[mypy-fastapi.*]
ignore_missing_imports = true

[mypy-dishka.*]
ignore_missing_imports = true

[mypy-starlette.*]
ignore_missing_imports = true

[mypy-structlog.*]
ignore_missing_imports = true

[mypy-httpx.*]
ignore_missing_imports = true

[mypy-bs4.*]
ignore_missing_imports = true

[mypy-confluent_kafka.*]
ignore_missing_imports = true

[mypy-alembic.*]
ignore_missing_imports = true

[mypy-uvicorn.*]
ignore_missing_imports = true

[mypy-search.entrypoint.di.*]
disable_error_code = misc, untyped-decorator

[mypy-search.infrastructure.persistence.tables.*]
disable_error_code = misc

[mypy-search.presentation.web.controllers.*]
disable_error_code = untyped-decorator

[mypy-search.presentation.cli.*]
disable_error_code = untyped-decorator